# Auto-refresh the @santacruzpharmacare Instagram feed shown on the landing
# page. Runs every 6 hours, fetches the latest 4 posts via the Graph API,
# commits the updated thumbnails + i18n entries to main, and Vercel
# auto-deploys.
#
# Required GitHub Secrets:
#   IG_LONG_LIVED_TOKEN  — IG Business long-lived access token (60-day)
#   IG_BUSINESS_USER_ID  — IG Business user id (from FB Page → Connected IG)
#
# The companion workflow refresh-ig-token.yml refreshes the token monthly
# so the long-lived expiry never bites us in production.

name: Refresh Instagram feed

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC). Adjust if owner wants
    # tighter latency at the cost of more commit noise in the repo.
    - cron: "0 */6 * * *"
  workflow_dispatch: # also allow manual triggers from the Actions tab

# Grant the default GITHUB_TOKEN permission to push commits back to main.
permissions:
  contents: write

concurrency:
  # Prevent two refresh runs overlapping if a manual run starts while a
  # scheduled one is mid-flight — would race the commit + push.
  group: refresh-ig
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Need full history so we can push back to main without rewinding.
          fetch-depth: 1
          # Use a token that has push rights to main (the default
          # GITHUB_TOKEN works here because we set permissions: contents: write).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install deps
        # Only need fs + fetch (Node built-ins) for fetch-ig-feed.mjs.
        # Frozen install ensures lockfile integrity.
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Fetch latest IG posts + update i18n + thumbnails
        env:
          IG_LONG_LIVED_TOKEN: ${{ secrets.IG_LONG_LIVED_TOKEN }}
          IG_BUSINESS_USER_ID: ${{ secrets.IG_BUSINESS_USER_ID }}
        run: pnpm fetch:ig

      - name: Verify i18n parity didn't break
        # Sanity check before committing — if our update accidentally broke
        # the ES/EN key parity, the build would fail in CI later but better
        # to catch here and bail without committing.
        run: pnpm check:i18n

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet src/messages/ public/instagram/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes — IG feed unchanged since last refresh."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --stat src/messages/ public/instagram/
          fi

      - name: Commit + push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "scca-feed-bot"
          git config user.email "scca-feed-bot@users.noreply.github.com"
          git add src/messages/es.json src/messages/en.json public/instagram/
          git commit -m "chore(ig): refresh feed from @santacruzpharmacare

          Auto-update by refresh-ig.yml workflow.
          Fetched via Instagram Graph API.

          Co-Authored-By: SCCA Feed Bot <scca-feed-bot@users.noreply.github.com>"
          git push origin HEAD:main
