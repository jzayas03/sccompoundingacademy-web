<section class="scca-section" id="contact">
  <div class="scca-container scca-card scca-form-wrap">
    <div class="scca-form-side">
      <h3 class="scca-h3">Have Questions?<br>We’re Here to Help.</h3>
      <p>Complete the form and our admissions team will reach out to you.</p>
    </div>
    <form class="scca-form">
      <div class="scca-field"><label>Full Name</label><input class="scca-input" placeholder="Enter your full name"></div>
      <div class="scca-field"><label>Email Address</label><input class="scca-input" type="email" placeholder="Enter your email"></div>
      <div class="scca-field"><label>Program Interest</label><select class="scca-select"><option>Select a program</option></select></div>
      <div class="scca-field"><label>Professional Role</label><select class="scca-select"><option>Select your role</option></select></div>
      <div class="scca-field scca-span-2"><label>Message</label><textarea class="scca-textarea" placeholder="How can we help you?"></textarea></div>
      <button class="scca-btn scca-btn-primary scca-span-2" type="submit">Submit Inquiry →</button>
    </form>
  </div>
</section>
