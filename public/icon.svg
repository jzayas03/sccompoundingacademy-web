<?xml version="1.0" encoding="UTF-8"?>
<!-- Favicon SVG — teal-deep rounded-square background with the chartreuse
     SCCA shield embedded as a base64 PNG so the icon is fully self-contained
     (external image refs in SVG favicons are blocked by browsers). Brand
     tokens mirror src/lib/brand.ts: teal-deep #195561, chartreuse #E6EA82
     (lives inside the embedded mark). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" rx="40" ry="40" fill="#195561"/>
  <image href="data:image/png;base64," x="25" y="18" width="130" height="144" preserveAspectRatio="xMidYMid meet"/>
</svg>
